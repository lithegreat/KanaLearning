name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set release variables
        id: vars
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "KanaLearning-win-x64-$version.zip"
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Restore app
        run: dotnet restore .\KanaLearning.csproj

      - name: Restore tests
        run: dotnet restore .\KanaLearning.Tests\KanaLearning.Tests.csproj

      - name: Build app (Release x64)
        run: dotnet build .\KanaLearning.csproj -c Release -p:Platform=x64 --no-restore

      - name: Run tests (Release x64)
        run: dotnet test .\KanaLearning.Tests\KanaLearning.Tests.csproj -c Release -p:Platform=x64 --verbosity normal

      - name: Publish app (Release win-x64)
        shell: pwsh
        run: |
          if (Test-Path .\artifacts\publish\win-x64) {
            Remove-Item .\artifacts\publish\win-x64 -Recurse -Force
          }
          dotnet publish .\KanaLearning.csproj `
            -c Release `
            -r win-x64 `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o .\artifacts\publish\win-x64

      - name: Validate publish output
        shell: pwsh
        run: |
          if (-not (Test-Path .\artifacts\publish\win-x64\KanaLearning.exe)) {
            throw "Publish output is missing KanaLearning.exe"
          }
          if (Test-Path .\artifacts\publish\win-x64\KanaLearning.pdb) {
            throw "Publish output should not include KanaLearning.pdb"
          }
          Get-ChildItem .\artifacts\publish\win-x64 | Select-Object Name, Length

      - name: Archive publish output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts\release -Force | Out-Null
          $zipPath = ".\artifacts\release\${{ steps.vars.outputs.zip_name }}"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path .\artifacts\publish\win-x64\KanaLearning.exe -DestinationPath $zipPath -Force
          Get-Item $zipPath | Select-Object FullName, Length, LastWriteTime

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.zip_name }}
          path: .\artifacts\release\${{ steps.vars.outputs.zip_name }}

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: KanaLearning ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: .\artifacts\release\${{ steps.vars.outputs.zip_name }}
          append_body: true
          body: |
            Runtime notes:
            - Target OS: Windows x64
            - Published as single-file self-contained package to reduce DLL clutter.
          overwrite_files: true
