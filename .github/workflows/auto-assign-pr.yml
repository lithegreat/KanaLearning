name: Auto Assign PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to repository owner
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const assignee = "lithegreat";

            const currentAssignees = context.payload.pull_request.assignees.map((a) => a.login);
            if (currentAssignees.includes(assignee)) {
              core.info(`PR #${pull_number} is already assigned to ${assignee}`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pull_number,
              assignees: [assignee],
            });

            core.info(`Assigned PR #${pull_number} to ${assignee}`);
