name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload_pdb_artifact:
        description: Upload PDB as internal artifact
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore tests
        run: dotnet restore .\KanaLearning.Tests\KanaLearning.Tests.csproj -p:DisablePackagingForTestBuild=true -p:PublishProfile= -p:EnableMsixTooling=false --nologo

      - name: Build tests (Debug x64)
        run: dotnet build .\KanaLearning.Tests\KanaLearning.Tests.csproj -c Debug -p:Platform=x64 -p:DisablePackagingForTestBuild=true -p:PublishProfile= -p:EnableMsixTooling=false --no-restore --nologo

      - name: Run tests (Debug x64)
        run: dotnet test .\KanaLearning.Tests\KanaLearning.Tests.csproj -c Debug -p:Platform=x64 -p:DisablePackagingForTestBuild=true -p:PublishProfile= -p:EnableMsixTooling=false --no-build --verbosity minimal --nologo

      - name: Upload optional PDB artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_pdb_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: KanaLearning-pdb-debug-${{ github.run_id }}
          path: |
            **/bin/**/Debug/**/KanaLearning.pdb
          if-no-files-found: warn
          retention-days: 7
