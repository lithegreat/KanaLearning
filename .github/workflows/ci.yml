name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore app
        run: dotnet restore .\KanaLearning.csproj

      - name: Restore tests
        run: dotnet restore .\KanaLearning.Tests\KanaLearning.Tests.csproj

      - name: Build app (Debug x64)
        run: dotnet build .\KanaLearning.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Run tests (Debug x64)
        run: dotnet test .\KanaLearning.Tests\KanaLearning.Tests.csproj -c Debug -p:Platform=x64 --verbosity normal
